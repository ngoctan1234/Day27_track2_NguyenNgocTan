version: '3'

services:
  airflow:
    image: apache/airflow:2.10.0
    container_name: airflow_lab

    ports:
      - "8080:8080"

    command: standalone

    env_file:
      - ./starter_project/.env

    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow

    volumes:
      - ./starter_project/dags:/opt/airflow/dags
      - ./starter_project/src:/opt/airflow/src
      - ./starter_project/data:/opt/airflow/data
      - ./starter_project/output:/opt/airflow/output
      - ./starter_project/.env:/opt/airflow/.env